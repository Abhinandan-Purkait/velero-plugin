name: PR CI

on:
  pull_request:
    branches:
      - 'mayastor'
    paths-ignore:
      - '*.md'
      - 'LICENSE'

jobs:
  verify-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
        id: go

      - name: Run lint
        run: make lint

      - name: Build the binary
        run: make build

      - name: Build container image
        run: make container

